<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Awesomeness inside</title>
<style>
:root{
  --bg-0:#07080d;
  --bg-1:#0d1020;
  --ink:#e9ecff;
  --ink-dim:#9aa3c7;
  --c1:#36b455;
  --c2:#23c6c8;
  --c3:#795d9c;
  --c4:#ef4a5b;
  --c5:#f2773f;
  --ring:rgba(255,255,255,.08);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,"Helvetica Neue",Arial,sans-serif;
  background:var(--bg-0);
  color:var(--ink);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  letter-spacing:.01em;
}

a{color:inherit;text-decoration:none}

.stage{
  position:fixed;inset:0;
  display:grid;
  place-items:center;
  isolation:isolate;
}

.bg{
  position:absolute;inset:0;z-index:-3;pointer-events:none;
  background:
    radial-gradient(60vmax 50vmax at 15% 20%,rgba(35,198,200,.30),transparent 60%),
    radial-gradient(55vmax 45vmax at 85% 25%,rgba(121,93,156,.32),transparent 60%),
    radial-gradient(70vmax 55vmax at 75% 82%,rgba(54,180,85,.26),transparent 60%),
    radial-gradient(50vmax 40vmax at 22% 85%,rgba(239,74,91,.18),transparent 60%),
    radial-gradient(40vmax 32vmax at 50% 50%,rgba(242,119,63,.12),transparent 60%),
    var(--bg-0);
}

.grid{
  position:absolute;inset:0;z-index:-2;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:56px 56px,56px 56px;
  mask-image:radial-gradient(ellipse at center,#000 35%,transparent 75%);
  -webkit-mask-image:radial-gradient(ellipse at center,#000 35%,transparent 75%);
}

.vignette{
  position:absolute;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(ellipse 55% 50% at center,transparent 0%,rgba(7,8,13,.55) 45%,rgba(7,8,13,.95) 80%,#07080d 100%);
}

.content{
  position:relative;z-index:1;
  text-align:center;
  padding:0 24px;
  max-width:min(1100px,92vw);
}

.brand{
  display:inline-block;
  margin:0 0 18px;
  font-weight:800;
  letter-spacing:-.04em;
  line-height:.95;
  font-size:clamp(72px,16vw,220px);
  color:#e9ecff;
  text-shadow:
    0 0 40px rgba(35,198,200,.35),
    0 0 80px rgba(167,139,250,.2);
  position:relative;
  cursor:pointer;
  opacity:0;
  transform:translateY(28px);
  animation:brandIn .9s .15s cubic-bezier(.2,.7,.2,1) forwards;
  transition:transform .4s ease, text-shadow .4s ease, color .4s ease;
}
@keyframes brandIn{
  to{opacity:1;transform:none}
}
.brand::after{
  content:"";
  position:absolute;left:50%;bottom:-14px;
  width:0;height:3px;border-radius:3px;
  background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3));
  transform:translateX(-50%);
  transition:width .4s cubic-bezier(.2,.7,.2,1);
  box-shadow:0 0 20px rgba(35,198,200,.45);
}
.brand:hover{
  transform:translateY(-6px);
  color:#fff;
  text-shadow:
    0 0 50px rgba(35,198,200,.55),
    0 0 100px rgba(167,139,250,.35);
}
.brand:hover::after{width:62%}
.brand:focus-visible{outline:2px solid var(--c2);outline-offset:8px;border-radius:4px}
.brand:focus-visible::after{width:62%}

.slogan{
  margin-top:34px;
  font-size:clamp(15px,1.6vw,20px);
  color:var(--ink-dim);
  font-weight:300;
  letter-spacing:.18em;
  text-transform:lowercase;
  opacity:0;transform:translateY(12px);
  animation:reveal 1s .5s cubic-bezier(.2,.7,.2,1) forwards;
}
.slogan span{
  display:inline-block;
  padding:0 4px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);
  border-radius:6px;
}

@keyframes reveal{
  to{opacity:1;transform:none}
}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:.001ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.001ms !important;
  }
  .brand{opacity:1;transform:none}
}

@media (max-width:520px){
  .slogan{letter-spacing:.16em}
}
</style>
</head>
<body>
  <main class="stage" aria-labelledby="brand">
    <div class="bg" aria-hidden="true"></div>
    <div class="grid" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>

    <section class="content">
      <a id="brand" class="brand" href="billing/" rel="noopener">Ubilling</a>
      <p class="slogan"><span>The path to awesomeness</span></p>
    </section>
  </main>
</body>
</html>
